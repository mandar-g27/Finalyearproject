[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    adafruit/Adafruit Fingerprint Sensor Library

; If PlatformIO auto-detects the wrong serial device (for example a Bluetooth
; COM port), set your board's USB serial port here. Replace COM7 with the
; correct port shown in Windows Device Manager or `platformio device list`.
; Example (uncomment and edit):
upload_port = COM8 ; <-- Change COM7 to your actual USB serial port
upload_speed = 115200